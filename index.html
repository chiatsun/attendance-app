<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>出勤紀錄系統</title>
  <link rel="stylesheet" href="style.css?v=1.1">
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>

<body>
  <div id="app">
    <!-- Main content area -->
    <main class="content-area">
      <!-- Home Tab -->
      <section id="tab-home" class="tab-content active">
        <header class="app-header">
          <h1>出勤紀錄</h1>
          <p class="subtitle">今天也要充滿活力</p>
        </header>

        <div class="clock-widget">
          <div class="time-display" id="current-time">00:00:00</div>
          <div class="date-display" id="current-date">載入中...</div>
        </div>

        <!-- Punch Settings Card -->
        <div class="settings-card" id="settings-card">
          <div class="settings-title">
            <span class="material-icons-round">tune</span>
            打卡設定
          </div>

          <!-- Work Type Toggle -->
          <div class="field-group" id="group-work-type">
            <label class="field-label">上班性質</label>
            <div class="toggle-group">
              <button class="toggle-btn active" id="type-normal" onclick="setWorkType('normal')">
                <span class="material-icons-round">work</span>
                上班
              </button>
              <button class="toggle-btn" id="type-overtime" onclick="setWorkType('overtime')">
                <span class="material-icons-round">schedule</span>
                加班
              </button>
            </div>
          </div>

          <!-- Manual Time Input -->
          <div class="field-group" id="group-manual-time">
            <label class="field-label" for="manual-time">上班時間（手動輸入）</label>
            <div class="time-input-wrapper">
              <span class="material-icons-round time-input-icon">access_time</span>
              <input type="time" id="manual-time" class="time-input" />
              <button class="clear-time-btn" onclick="clearManualTime()" title="使用打卡當下時間">
                <span class="material-icons-round">close</span>
              </button>
              
              <!-- Quick Time Picker Panel (Moved inside wrapper) -->
              <div id="quick-picker" class="quick-picker glass-panel">
                <div class="picker-header">
                  <span>快速點選</span>
                  <button class="picker-close" onclick="closeQuickPicker()">×</button>
                </div>
                <div class="picker-columns">
                  <div class="picker-col" id="col-hour">
                    <div class="col-label">時</div>
                    <div class="col-items">
                      <button class="col-item" onclick="pick('h', 6)">06</button>
                      <button class="col-item" onclick="pick('h', 7)">07</button>
                      <button class="col-item" onclick="pick('h', 8)">08</button>
                      <button class="col-item" onclick="pick('h', 9)">09</button>
                      <button class="col-item" onclick="pick('h', 10)">10</button>
                    </div>
                  </div>
                  <div class="picker-col" id="col-min-tens">
                    <div class="col-label">分(10s)</div>
                    <div class="col-items">
                      <button class="col-item" onclick="pick('t', 0)">00</button>
                      <button class="col-item" onclick="pick('t', 1)">10</button>
                      <button class="col-item" onclick="pick('t', 2)">20</button>
                      <button class="col-item" onclick="pick('t', 3)">30</button>
                      <button class="col-item" onclick="pick('t', 4)">40</button>
                      <button class="col-item" onclick="pick('t', 5)">50</button>
                    </div>
                  </div>
                  <div class="picker-col" id="col-min-units">
                    <div class="col-label">分(1s)</div>
                    <div class="col-items">
                      <button class="col-item" onclick="pick('u', 0)">0</button>
                      <button class="col-item" onclick="pick('u', 1)">1</button>
                      <button class="col-item" onclick="pick('u', 2)">2</button>
                      <button class="col-item" onclick="pick('u', 3)">3</button>
                      <button class="col-item" onclick="pick('u', 4)">4</button>
                      <button class="col-item" onclick="pick('u', 5)">5</button>
                      <button class="col-item" onclick="pick('u', 6)">6</button>
                      <button class="col-item" onclick="pick('u', 7)">7</button>
                      <button class="col-item" onclick="pick('u', 8)">8</button>
                      <button class="col-item" onclick="pick('u', 9)">9</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <p class="field-hint" id="manual-time-hint">留空則以按下「上班打卡」時的時間為準</p>
          </div>

          <!-- Notification Settings -->
          <div class="field-group">
            <div class="notify-header">
              <label class="field-label" style="margin:0">下班前提醒通知</label>
              <label class="switch">
                <input type="checkbox" id="notify-toggle" onchange="onNotifyToggle(this.checked)">
                <span class="switch-track">
                  <span class="switch-thumb">
                    <span class="material-icons-round switch-icon">notifications_off</span>
                  </span>
                </span>
              </label>
            </div>
            <div class="notify-presets" id="notify-presets">
              <span class="preset-label">提前</span>
              <button class="preset-btn active" id="preset-5"  onclick="setNotifyMins(5)">5 分</button>
              <button class="preset-btn"        id="preset-10" onclick="setNotifyMins(10)">10 分</button>
              <button class="preset-btn"        id="preset-15" onclick="setNotifyMins(15)">15 分</button>
              <button class="preset-btn"        id="preset-30" onclick="setNotifyMins(30)">30 分</button>
              <span class="preset-label">前通知</span>
            </div>
            <p class="field-hint" id="notify-hint">開啟後，將在預計下班前提醒您</p>
          </div>
        </div>

        <div class="status-card">
          <div class="status-indicator">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">目前的狀態：尚未打卡</span>
          </div>
          <div class="work-duration" id="work-duration">
            00:00:00
          </div>
          <!-- Mode toggle button -->
          <button id="mode-toggle-btn" class="mode-toggle-btn" onclick="toggleDisplayMode()" style="display:none">
            <span class="material-icons-round">schedule</span> 已上班時間
          </button>
          <!-- Estimated punch-out time -->
          <div class="punchout-estimate" id="punchout-estimate" style="display:none; flex-direction: column; align-items: center; gap: 4px;">
            <div>
              <span class="material-icons-round" style="font-size:16px; vertical-align:middle;">flag</span>
              預計下班：<strong id="punchout-time-display">--:--</strong>
              <span id="break-label" style="font-size:12px; color:var(--text-secondary);"></span>
            </div>
            <div id="leave-note" style="display:none; font-size:13px; color: #f39c12;">
              <span class="material-icons-round" style="font-size:14px; vertical-align:middle;">beach_access</span>
              已含請假 <strong id="leave-hours-display"></strong> 小時
            </div>
          </div>
        </div>

        <div class="punch-controls">
          <button id="btn-punch-in" class="punch-btn btn-primary" onclick="handlePunchIn()">
            <span class="material-icons-round">login</span>
            上班打卡
          </button>
          <button id="btn-punch-out" class="punch-btn btn-secondary disabled" onclick="handlePunchOut()" disabled>
            <span class="material-icons-round">logout</span>
            下班打卡
          </button>
        </div>
      </section>

      <!-- History Tab -->
      <section id="tab-history" class="tab-content">
        <header class="app-header">
          <h1>歷史紀錄</h1>
          <p class="subtitle">您的出勤總覽</p>
        </header>

        <div class="history-list" id="history-container">
          <!-- History items will be injected here via JS -->
        </div>
      </section>

      <!-- Leave Tab -->
      <section id="tab-leave" class="tab-content">
        <header class="app-header">
          <h1>請假設定</h1>
          <p class="subtitle">提早休息，充飽電再出發</p>
        </header>

        <div class="settings-card" id="leave-settings-card">
          <div class="field-group">
            <div class="notify-header" style="margin-bottom: 8px;">
              <label class="field-label" style="margin:0; font-size:15px;">是否請假</label>
              <label class="switch">
                <input type="checkbox" id="leave-toggle" onchange="onLeaveToggle(this.checked)">
                <span class="switch-track">
                  <span class="switch-thumb">
                    <span class="material-icons-round switch-icon" id="leave-switch-icon" style="font-size: 13px !important; color: #aaa;">event_busy</span>
                  </span>
                </span>
              </label>
            </div>
            <p class="field-hint" id="leave-hint">開啟後，可選擇今日預計請假的時數。</p>
          </div>

          <div class="field-group" id="group-leave-hours" style="opacity: 0.5; pointer-events: none; margin-top: 24px;">
            <label class="field-label" style="margin-bottom:12px;">選擇請假時數（由下班往前推）</label>
            <div class="leave-grid">
              <button class="leave-btn active" id="leave-btn-1" onclick="setLeaveHours(1)">
                <span>1 小時</span>
                <span id="leave-time-1" class="leave-time-label"></span>
              </button>
              <button class="leave-btn" id="leave-btn-2" onclick="setLeaveHours(2)">
                <span>2 小時</span>
                <span id="leave-time-2" class="leave-time-label"></span>
              </button>
              <button class="leave-btn" id="leave-btn-3" onclick="setLeaveHours(3)">
                <span>3 小時</span>
                <span id="leave-time-3" class="leave-time-label"></span>
              </button>
              <button class="leave-btn" id="leave-btn-4" onclick="setLeaveHours(4)">
                <span>4 小時</span>
                <span id="leave-time-4" class="leave-time-label"></span>
              </button>
              <button class="leave-btn" id="leave-btn-5" onclick="setLeaveHours(5)">
                <span>5 小時</span>
                <span id="leave-time-5" class="leave-time-label"></span>
              </button>
              <button class="leave-btn" id="leave-btn-6" onclick="setLeaveHours(6)">
                <span>6 小時</span>
                <span id="leave-time-6" class="leave-time-label"></span>
              </button>
              <button class="leave-btn" id="leave-btn-7" onclick="setLeaveHours(7)">
                <span>7 小時</span>
                <span id="leave-time-7" class="leave-time-label"></span>
              </button>
              <button class="leave-btn" id="leave-btn-8" onclick="setLeaveHours(8)">
                <span>8 小時</span>
                <span id="leave-time-8" class="leave-time-label"></span>
              </button>
            </div>
          </div>

          <!-- Leave Summary Note -->
          <div id="leave-summary-note" class="leave-summary-note" style="display:none;">
            <span class="material-icons-round">info</span>
            <span id="leave-range-text">預計請假時段：--:-- ~ --:--</span>
          </div>
        </div>
        </div>
      </section>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="switchTab('home')">
        <span class="material-icons-round">fingerprint</span>
        <span>打卡</span>
      </button>
      <button class="nav-item" onclick="switchTab('history')">
        <span class="material-icons-round">history</span>
        <span>紀錄</span>
      </button>
      <button class="nav-item" onclick="switchTab('leave')">
        <span class="material-icons-round">beach_access</span>
        <span>請假</span>
      </button>
    </nav>
  </div>

  <script src="main.js?v=1.1"></script>
</body>

</html>
